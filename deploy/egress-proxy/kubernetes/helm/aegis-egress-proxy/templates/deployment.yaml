apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis-egress-proxy.fullname" . }}
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "aegis-egress-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "aegis-egress-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aegis-egress-proxy.labels" . | nindent 8 }}
        {{- include "aegis-egress-proxy.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aegis-egress-proxy.fullname" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: envoy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["envoy", "-c", "/etc/envoy/envoy.yaml"]
          ports:
            - name: proxy
              containerPort: 8888
              protocol: TCP
            - name: admin-metrics
              containerPort: 9901
              protocol: TCP
          env:
            - name: AEGIS_EGRESS_AUDIT_SHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretRef.name }}
                  key: {{ .Values.secretRef.auditSharedKey }}
                  optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: admin-metrics
          livenessProbe:
            httpGet:
              path: /ready
              port: admin-metrics
          resources:
            {{- toYaml .Values.resources | nindent 20 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
              readOnly: true
            - name: envoy-config
              mountPath: /etc/envoy/policy.lua
              subPath: policy.lua
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "aegis-egress-proxy.fullname" . }}-config
